<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>CS:GO Case Horizontal Scroll</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Убираем переход opacity, чтобы не было fade для видео */
    #backgroundVideo {
      transition: none;
    }
    /* Стили для отображения количества участников */
    #participantCount {
      position: absolute;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 24px;
      color: #ffffff;
      z-index: 10000;
    }
  </style>
</head>
<body>
  <!-- Фоновое видео -->
  <video id="backgroundVideo" playsinline muted preload="auto" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1;"></video>

  <!-- Оверлей с лентой скинов -->
  <div id="overlayContainer">
    <div id="startMessage">...</div>
    <div id="rollerContainer">
      <div id="centerLine"></div> <!-- Стрелка / линия -->
      <div id="skinStrip"></div>
    </div>
  </div>

  <!-- Оверлей для показа победителя -->
  <div id="winnerOverlay"></div>

  <!-- Счётчик участников -->
  <div id="participantCount">Participants: 0</div>

  <!-- Звуковые эффекты -->
  <audio id="tickSound" src="sounds/tick.wav" preload="auto"></audio>
  <audio id="winnerSound" src="sounds/winner.wav" preload="auto"></audio>

  <script>
    let skins = [];
    let rarityChances = {};
    let overlaySettings = {};
    let scrollSpeed = 10; // время анимации прокрутки (сек)
    let presetWinningIndex;
    let participants = []; // Глобальный массив участников
    let ws; // Глобальная переменная для WebSocket

    // Функция для установки WebSocket с авто-переподключением
    function connectWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(protocol + '//' + window.location.host);


      ws.onopen = () => {
        console.log('[Overlay] WebSocket connected!');
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        console.log('[Overlay] Message received:', data);

        if (data.type === 'open') {
          fadeInOverlay();
          playVideo();
        } else if (data.type === 'roll') {
          // --- НАЧАЛО ИЗМЕНЕНИЙ ---
          const serverDeterminedWinnerName = data.winner;
          const serverDeterminedWinningSkin = data.selectedSkinToDisplay || (data.dropMode === 'preset' ? data.fixedSkin : null);

          // Обновляем глобальные настройки клиента, если они пришли с сервера и могут повлиять на отображение
          // Эти настройки (dropMode, fixedSkin) используются в onRollAnimationEnd и startScrolling
          if (data.dropMode) {
            overlaySettings.dropMode = data.dropMode;
          }
          if (data.fixedSkin) { // data.fixedSkin от сервера должно быть объектом скина, если dropMode='preset'
            overlaySettings.fixedSkin = data.fixedSkin;
          }
          // scrollSpeed тоже может приходить от сервера и влиять на анимацию, если нужно
          // if (data.scrollSpeed) {
          //   scrollSpeed = data.scrollSpeed;
          // }

          startScrolling(data.participants || [], serverDeterminedWinnerName, serverDeterminedWinningSkin);
          // --- КОНЕЦ ИЗМЕНЕНИЙ ---
        } else if (data.type === 'updateParticipants') {
          updateParticipantsOverlay(data.participants);
        } else if (data.type === 'settings-updated') {
          window.location.reload();
        }
      };

      ws.onclose = () => {
        console.log('[Overlay] WebSocket connection closed. Reconnecting in 3 seconds...');
        setTimeout(connectWebSocket, 3000);
      };

      ws.onerror = (error) => {
        console.error('[Overlay] WebSocket error:', error);
        ws.close();
      };
    }

    // Загрузка настроек с сервера (/get-settings)
    async function loadSettings() {
      try {
        const response = await fetch('/get-settings');
        if (!response.ok) throw new Error('Settings not loaded');
        const config = await response.json();

        skins = Array.isArray(config.skins) ? config.skins : [];
        rarityChances = config.rarityChances || {};
        overlaySettings = {
          dropMode: config.dropMode || 'random',
          fixedSkin: config.fixedSkin || null
        };
        scrollSpeed = config.scrollSpeed || 10;
        console.log('[Overlay] Settings loaded:', config);
      } catch (err) {
        console.error('[Overlay] Error loading settings:', err);
      }
    }

    // Выбор случайного скина по шансам
    function randomSkin() {
      if (!rarityChances || !Object.keys(rarityChances).length || !skins.length) {
        return { name: "Default Skin", image: "img/default.png", rarity: "Mil-Spec" };
      }
      const rand = Math.random() * 100;
      let cumulative = 0, selectedRarity = null;
      for (const rarity in rarityChances) {
        cumulative += rarityChances[rarity];
        if (rand < cumulative) {
          selectedRarity = rarity;
          break;
        }
      }
      const filtered = skins.filter(s => s.rarity === selectedRarity);
      if (!filtered.length) {
        return skins[Math.floor(Math.random() * skins.length)];
      }
      return filtered[Math.floor(Math.random() * filtered.length)];
    }

    // Случайный выбор ника из списка участников
    function randomUser(participants) {
      return (!participants || !participants.length)
        ? 'viewer'
        : participants[Math.floor(Math.random() * participants.length)];
    }

    // Пересоздание ленты скинов
    function resetSkinStrip() {
      const rollerContainer = document.getElementById('rollerContainer');
      const oldStrip = document.getElementById('skinStrip');
      if (oldStrip) {
        rollerContainer.removeChild(oldStrip);
      }
      const newStrip = document.createElement('div');
      newStrip.id = 'skinStrip';
      rollerContainer.appendChild(newStrip);
      return newStrip;
    }

    // Плавное появление оверлея
    function fadeInOverlay() {
      const overlay = document.getElementById('overlayContainer');
      overlay.classList.remove('visible');

      const startMsg = document.getElementById('startMessage');
      startMsg.style.display = 'block';
      setTimeout(() => { startMsg.style.display = 'none'; }, 4000);

      resetSkinStrip();

      const styleEl = document.getElementById('dynamicKeyframes');
      if (styleEl) styleEl.remove();

      setTimeout(() => {
        overlay.classList.add('visible');
        startInitialAnimation();
      }, 100);
    }

    // Функция для плавного скрытия оверлея
    function fadeOutOverlay() {
      const overlay = document.getElementById('overlayContainer');
      overlay.classList.remove('visible');
      console.log('[Overlay] fadeOutOverlay triggered');
    }

    // Начальная анимация ленты (эффект "прогрева")
    function startInitialAnimation() {
      const stripDiv = document.getElementById('skinStrip');
      stripDiv.style.animation = '';
      void stripDiv.offsetWidth;
      stripDiv.innerHTML = '';
      stripDiv.classList.add('initial-animation');

      // Генерируем 150 элементов. Если участники уже есть – используем их имена циклически, иначе – "viewer".
      for (let i = 0; i < 150; i++) {
        let nickname = (participants && participants.length > 0)
                       ? participants[i % participants.length]
                       : 'viewer';
        const s = randomSkin();
        stripDiv.insertAdjacentHTML('beforeend', createSkinBlockHTML(nickname, s));
      }
    }

    // Генерация HTML для одного блока скина
    function createSkinBlockHTML(nickname, skin) {
      return `
        <div class="oneFrame skinItem" data-rarity="${skin.rarity}">
          <div class="participantsBG"></div>
          <div class="participantsNickname">${nickname}</div>
          <div class="f1"></div>
          <div class="skinPhoto" style="background-image:url('${skin.image}')"></div>
          <div class="weaponType">${skin.weapontype || ''}</div>
          <div class="skinName">${skin.name}</div>
        </div>
      `;
    }

    // Обновление никнеймов в уже созданных блоках, обновление глобального массива участников 
    // и отображение количества участников в специальном блоке
    function updateParticipantsOverlay(newParticipants) {
      participants = newParticipants;
      const nicknameElements = document.querySelectorAll('.participantsNickname');
      nicknameElements.forEach((el, index) => {
        el.textContent = (participants && participants.length > 0)
                         ? participants[index % participants.length]
                         : 'viewer';
      });
      // Обновляем счётчик участников
      const countEl = document.getElementById('participantCount');
      if (countEl) {
        countEl.textContent = 'Participants: ' + participants.length;
      }
    }

    // Функция для управления видео
    function playVideo() {
      const video = document.getElementById('backgroundVideo');
      video.src = 'videos/case.webm'; // путь к видео
      video.play().catch(err => console.error('Ошибка воспроизведения видео:', err));
      
      // Останавливаем видео на 3.5 сек.
      function checkTime() {
        if (video.currentTime >= 3.5) {
          video.pause();
          video.removeEventListener('timeupdate', checkTime);
          console.log('[Video] Остановлено на стоп-кадре 3.5 сек.');
        }
      }
      video.addEventListener('timeupdate', checkTime);
    }

    // Функция прокрутки скинов
    // Функция прокрутки скинов
    function startScrolling(participantsList, winnerName, winningSkin) { // Добавлены winnerName и winningSkin
      const stripDiv = document.getElementById('skinStrip');
      stripDiv.classList.remove('initial-animation'); // Сброс предыдущей анимации, если была
      stripDiv.style.animation = ''; // Явно очищаем анимацию
      void stripDiv.offsetWidth; // Трюк для перезапуска CSS анимации, если потребуется немедленное применение новой

      stripDiv.style.transition = 'none';
      stripDiv.style.transform = 'translateX(0)';
      stripDiv.innerHTML = '';

      const totalItems = 75; // Общее количество элементов в ленте
      // Индекс элемента, который будет выигрышным (например, центральный).
      // Этот элемент будет содержать данные от сервера.
      const winningDisplayIndex = Math.floor(totalItems / 2);
      presetWinningIndex = winningDisplayIndex; // Сохраняем глобально для onRollAnimationEnd

      for (let i = 0; i < totalItems; i++) {
        let currentSkin, currentNickname;
        if (i === winningDisplayIndex) {
          // Это выигрышный элемент - используем данные от сервера
          currentSkin = winningSkin;
          currentNickname = winnerName;
        } else {
          // Остальные элементы - случайные
          currentSkin = randomSkin(); // Ваша функция для получения случайного скина
          // Выбираем случайного пользователя, можно исключить победителя, если участников много
          let otherParticipants = participantsList.filter(p => p !== winnerName);
          if (otherParticipants.length === 0 && participantsList.length > 0) { // Если остался только победитель или список пуст, но победитель есть
             currentNickname = randomUser(participantsList); // Берем из исходного списка
          } else if (otherParticipants.length > 0) {
             currentNickname = randomUser(otherParticipants);
          } else {
             currentNickname = 'viewer'; // Если участников нет вообще
          }
        }

        // Фоллбэк, если скин по какой-то причине не определился (например, winningSkin был null/undefined)
        if (!currentSkin || !currentSkin.name || !currentSkin.image) {
          console.warn('[Overlay] Fallback skin used for item index:', i, 'Original skin data:', currentSkin);
          currentSkin = { name: "Default Skin", image: "img/default.png", rarity: "Mil-Spec", weapontype: "" };
        }
        stripDiv.insertAdjacentHTML('beforeend', createSkinBlockHTML(currentNickname, currentSkin));
      }

      const firstItem = stripDiv.querySelector('.skinItem');
      const skinWidth = firstItem ? firstItem.offsetWidth : 257; // Ширина одного элемента

      // Определяем координаты контейнера и стрелки для точного позиционирования
      const container = document.getElementById('rollerContainer');
      const containerRect = container.getBoundingClientRect();
      const arrow = document.getElementById('centerLine');
      const arrowRect = arrow.getBoundingClientRect();

      // Центр стрелки относительно начала rollerContainer
      const arrowCenterRelativeToContainer = (arrowRect.left + arrowRect.width / 2) - containerRect.left;

      // Рассчитываем scrollDistance так, чтобы элемент с winningDisplayIndex (выигрышный)
      // оказался своим центром точно под центром стрелки.
      // Позиция начала выигрышного элемента: winningDisplayIndex * skinWidth
      // Центр выигрышного элемента: winningDisplayIndex * skinWidth + skinWidth / 2
      // Нам нужно, чтобы эта точка совпала с arrowCenterRelativeToContainer после сдвига.
      // Сдвиг = (winningDisplayIndex * skinWidth + skinWidth / 2) - arrowCenterRelativeToContainer
      const scrollDistance = (winningDisplayIndex * skinWidth) + (skinWidth / 2) - arrowCenterRelativeToContainer;

      // Динамическое создание keyframes для анимации
      const keyframes = `
        @keyframes rollAnimation {
          0% { transform: translateX(0px); } /* Начальное положение */
          100% { transform: translateX(-${scrollDistance}px); } /* Конечное положение */
        }
      `;
      let styleEl = document.getElementById('dynamicKeyframes');
      if (!styleEl) {
        styleEl = document.createElement('style');
        styleEl.id = 'dynamicKeyframes';
        document.head.appendChild(styleEl);
      }
      styleEl.innerHTML = keyframes; // Устанавливаем новые keyframes

      // Запускаем анимацию с небольшой задержкой, чтобы браузер успел применить стили
      setTimeout(() => {
        stripDiv.style.animation = `rollAnimation ${scrollSpeed}s ease-out forwards`;
      }, 50); // Небольшая задержка, можно 10-100ms

      startTickSoundCheck(); // Запускаем звук тиков

      // Добавляем обработчик окончания анимации
      stripDiv.addEventListener('animationend', onRollAnimationEnd, { once: true });
    }

    // Определение победителя по окончании анимации
    // Определение победителя по окончании анимации (ОБНОВЛЕННАЯ ВЕРСИЯ)
    function onRollAnimationEnd(e) {
      if (e.animationName !== 'rollAnimation') return;

      const arrow = document.getElementById('centerLine');
      const arrowRect = arrow.getBoundingClientRect();
      const skinStrip = document.getElementById('skinStrip');
      const items = document.querySelectorAll('#skinStrip .skinItem');
      let winnerItem = null;

      // Теперь мы всегда ожидаем, что presetWinningIndex указывает на правильный элемент,
      // так как он был установлен в startScrolling с данными от сервера.
      if (typeof presetWinningIndex !== 'undefined' && items[presetWinningIndex]) {
        winnerItem = items[presetWinningIndex];

        // Логика точной центровки элемента (adjustment) остается актуальной и полезной.
        // Она гарантирует, что выбранный элемент будет идеально по центру.
        const rect = winnerItem.getBoundingClientRect();
        const itemCenter = rect.left + rect.width / 2; // Центр победившего элемента на экране
        const arrowVisualCenter = arrowRect.left + arrowRect.width / 2; // Центр стрелки на экране
        const adjustment = itemCenter - arrowVisualCenter; // На сколько нужно сдвинуть ленту, чтобы центры совпали

        const style = window.getComputedStyle(skinStrip);
        let currentTransformX = 0;
        // Пытаемся получить текущее значение transform translateX
        try {
            // DOMMatrixReadOnly или DOMMatrix - более современный и стандартный способ
            const matrix = new DOMMatrixReadOnly(style.transform);
            currentTransformX = matrix.m41;
        } catch (err) {
            // Фоллбэк для браузеров, не поддерживающих DOMMatrix напрямую из строки,
            // или если WebKitCSSMatrix более привычен (но он нестандартный)
            try {
                const matrix = new WebKitCSSMatrix(style.transform);
                currentTransformX = matrix.m41;
            } catch (fallbackErr) {
                console.warn('[Overlay] Could not parse transform matrix using DOMMatrix/WebKitCSSMatrix, using regex fallback. Accuracy might be affected.', fallbackErr);
                // Очень грубый фоллбэк, если matrix не работает.
                const transformValue = style.transform || skinStrip.style.transform; // Пробуем оба источника
                const match = transformValue.match(/translateX\(([^px]+)px\)/);
                if (match && match[1]) {
                    currentTransformX = parseFloat(match[1]);
                } else {
                    currentTransformX = 0; // Не удалось определить, считаем 0
                    console.warn('[Overlay] Failed to determine currentTransformX.');
                }
            }
        }

        const finalTransformX = currentTransformX - adjustment; // Новое значение translateX

        // Плавная доводка до идеального центра
        skinStrip.style.transition = 'transform 0.3s ease-out'; // Короткая плавная анимация
        skinStrip.style.transform = `translateX(${finalTransformX}px)`;

        // Добавляем слушатель события transitionend, чтобы продолжить после завершения анимации доводки
        skinStrip.addEventListener('transitionend', function adjustmentTransitionEndHandler() {
            skinStrip.removeEventListener('transitionend', adjustmentTransitionEndHandler); // Удаляем обработчик, чтобы он не сработал снова
            proceedWithWinner(winnerItem); // Вызываем основную логику обработки победителя
        }, { once: true }); // { once: true } гарантирует, что обработчик сработает только один раз

        return; // Выходим из onRollAnimationEnd, так как остальная логика будет в proceedWithWinner после transition

      } else {
        console.error('[Overlay] presetWinningIndex не установлен или элемент с таким индексом не найден. Невозможно достоверно определить победителя.');
        // Если в этом случае ничего не делать, то анимация победителя и звуки не сработают.
        // Можно добавить фоллбэк на старую логику поиска ближайшего элемента, если это критично,
        // но это будет означать, что основная логика определения победителя дала сбой.
        // Например, можно раскомментировать и адаптировать следующий блок, если нужен фоллбэк:
        /*
        console.warn('[Overlay] Fallback: trying to find the closest item geometrically.');
        let minDist = Infinity;
        items.forEach(item => {
          const rect = item.getBoundingClientRect();
          const itemCenter = rect.left + rect.width / 2;
          const dist = Math.abs(itemCenter - (arrowRect.left + arrowRect.width / 2));
          if (dist < minDist) {
            minDist = dist;
            winnerItem = item;
          }
        });
        if (winnerItem) {
          // Если используете фоллбэк, то и доводку нужно здесь делать
          const rect = winnerItem.getBoundingClientRect();
          const itemCenter = rect.left + rect.width / 2;
          const adjustment = itemCenter - (arrowRect.left + arrowRect.width / 2);
          const style = window.getComputedStyle(skinStrip);
          // ... (код для currentTransformX и finalTransformX, как выше) ...
          skinStrip.style.transition = 'transform 0.3s ease-out';
          skinStrip.style.transform = `translateX(${finalTransformX}px)`;
          skinStrip.addEventListener('transitionend', function fallbackAdjustmentEnd() {
            skinStrip.removeEventListener('transitionend', fallbackAdjustmentEnd);
            proceedWithWinner(winnerItem);
          }, { once: true });
          return;
        } else {
            console.error('[Overlay] Fallback failed to find a winner item.');
        }
        */
        return; // Выход, так как победитель не определен корректно
      }
    }

    // Новая вспомогательная функция для продолжения после определения и доводки победителя
    function proceedWithWinner(winnerItem) {
        if (!winnerItem) {
            console.error('[Overlay] proceedWithWinner вызван без winnerItem.');
            // Возможно, стоит скрыть оверлей или показать сообщение об ошибке пользователю
            fadeOutOverlay(); // Например, просто скрыть оверлей
            return;
        }
        console.log('[Overlay] Confirmed winner (after adjustment):', winnerItem);
        // Дополнительное логирование для отладки
        const winnerNickFromDOM = winnerItem.querySelector('.participantsNickname') ? winnerItem.querySelector('.participantsNickname').textContent : 'N/A';
        const winnerSkinNameFromDOM = winnerItem.querySelector('.skinName') ? winnerItem.querySelector('.skinName').textContent : 'N/A';
        console.log(`[Overlay] Winner displayed: Nick: ${winnerNickFromDOM}, Skin: ${winnerSkinNameFromDOM}`);

        const winnerSound = document.getElementById('winnerSound');
        if (winnerSound) {
            winnerSound.currentTime = 0;
            winnerSound.play().catch(e => console.error("Error playing winner sound:", e));
        }

        animateWinnerHex(winnerItem); // Ваша функция анимации победившего гекса

        // Через 6 секунд после показа победителя продолжаем воспроизведение видео
        setTimeout(() => {
            const video = document.getElementById('backgroundVideo');
            if (video) { // Проверка на существование видео элемента
                 video.play().catch(err => console.error('Ошибка продолжения видео:', err));
            }
        }, 6000);

        // Через 8 секунд скрываем оверлей
        setTimeout(() => {
            fadeOutOverlay(); // Ваша функция для скрытия оверлея
        }, 8000);
    }

    // Функция анимации победителя (без изменений, как в исходном варианте)
    function animateWinnerHex(winnerItem) {
  const centerLine = document.getElementById('centerLine');
  if (!centerLine) {
    console.error('[Overlay] CRITICAL: #centerLine element not found in animateWinnerHex!');
    return;
  }
  const centerRect = centerLine.getBoundingClientRect();
  // --- НАЧАЛО ДОБАВЛЕННОГО ЛОГИРОВАНИЯ ---
  console.log('[animateWinnerHex] INPUTS:');
  console.log('[animateWinnerHex] centerLine Rect:', JSON.stringify(centerRect));
  console.log('[animateWinnerHex] winnerItem received:', winnerItem ? winnerItem.outerHTML.substring(0, 100) + '...' : 'null');
  // --- КОНЕЦ ДОБАВЛЕННОГО ЛОГИРОВАНИЯ ---

  const cloneWidth = 280, cloneHeight = 368;
  const centerX = centerRect.left + centerRect.width / 2;
  const centerY = centerRect.top + centerRect.height / 2;

  // --- ДОБАВЛЕННОЕ ЛОГИРОВАНИЕ РАССЧИТАННЫХ КООРДИНАТ ---
  const calculatedLeft = (centerX - cloneWidth / 2 + 2);
  const calculatedTop = (centerY - cloneHeight / 2 - -2); // т.е. + 290
  console.log(`[animateWinnerHex] Calculated centerX: ${centerX}, centerY: ${centerY}`);
  console.log(`[animateWinnerHex] JS calculated clone.style.left: ${calculatedLeft}px`);
  console.log(`[animateWinnerHex] JS calculated clone.style.top: ${calculatedTop}px`);
  // --- КОНЕЦ ДОБАВЛЕННОГО ЛОГИРОВАНИЯ ---

  const clone = winnerItem.cloneNode(true);
  clone.id = 'floatingWinner';
  clone.classList.add('winnerFinal');

  const overlay = document.getElementById('winnerOverlay');
  if (!overlay) {
    console.error('[Overlay] CRITICAL: #winnerOverlay element not found in animateWinnerHex!');
    return;
  }
  overlay.innerHTML = '';
  overlay.classList.add('visible');
  overlay.appendChild(clone);

  clone.style.position = 'absolute';
  clone.style.width = cloneWidth + 'px'; // Будет переопределено CSS .winnerFinal из-за !important, если width/height там есть
  clone.style.height = cloneHeight + 'px';// Будет переопределено CSS .winnerFinal из-за !important
  clone.style.left = calculatedLeft + 'px';
  clone.style.top  = calculatedTop + 'px';
  clone.style.transition = 'opacity 1s ease-out';
  clone.style.opacity = '1';

  // ... остальной код функции (participantsBG, winnerDiv, setTimeout)
  // Убедитесь, что эта часть не вызывает ошибок
  const participantsBG = clone.querySelector('.participantsBG');
  if (participantsBG) {
    participantsBG.style.display = 'none';
  }

  const winnerDiv = document.createElement('div');
  winnerDiv.className = 'winner';
  winnerDiv.textContent = 'winner'; // Текст подписи
  clone.appendChild(winnerDiv);

  console.log('[animateWinnerHex] Setting timeout for clone opacity and #winnerOverlay removal (8750ms)');
  setTimeout(() => {
    if (clone) { // Проверка, что клон еще существует
      console.log('[animateWinnerHex timeout] Setting clone opacity to 0');
      clone.style.opacity = '0';
      clone.addEventListener('transitionend', () => {
        if (overlay) { // Проверка, что оверлей еще существует
          console.log('[animateWinnerHex clone transitionend] Hiding #winnerOverlay');
          overlay.classList.remove('visible');
          overlay.innerHTML = '';
        }
      }, { once: true });
    }
  }, 8750);
}

    // Звук "тиков" при прокрутке
    function startTickSoundCheck() {
      let lastTickIndex = -1;
      let animating = true;
      const container = document.getElementById('rollerContainer');
      const tickSound = document.getElementById('tickSound');
      const stripDiv = document.getElementById('skinStrip');

      stripDiv.addEventListener('animationend', (e) => {
        if (e.animationName === 'rollAnimation') {
          animating = false;
        }
      });

      function rampVolume(audio, startVol, endVol, duration) {
        let startTime = null;
        function step(timestamp) {
          if (!startTime) startTime = timestamp;
          let elapsed = timestamp - startTime;
          let progress = Math.min(elapsed / duration, 1);
          audio.volume = startVol + (endVol - startVol) * progress;
          if (progress < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }

      function checkTick() {
        if (!animating) return;
        const containerRect = container.getBoundingClientRect();
        const centerX = containerRect.left + containerRect.width / 2 + 1;
        const skinItems = document.querySelectorAll('#skinStrip .skinItem');
        skinItems.forEach((item, index) => {
          const rect = item.getBoundingClientRect();
          if (rect.left <= centerX && rect.right >= centerX) {
            if (lastTickIndex !== index) {
              lastTickIndex = index;
              tickSound.currentTime = 0;
              tickSound.volume = 0.1;
              tickSound.play();
              rampVolume(tickSound, 0.1, 1.0, 4000);
            }
          }
        });
        requestAnimationFrame(checkTick);
      }
      requestAnimationFrame(checkTick);
    }

    // При загрузке страницы сначала загружаются настройки, а затем устанавливается WebSocket-соединение
    document.addEventListener('DOMContentLoaded', async () => {
      await loadSettings();
      connectWebSocket();
    });
  </script>
