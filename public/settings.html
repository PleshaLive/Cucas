<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - New Design (Sidebar)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="settings.css" />
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-main-title"><i class="fas fa-tools"></i> <span data-i18n="sidebar.title">Controls</span></h2>
        </div>
        <div class="sidebar-sticky-content styled-scrollbar">
            <div class="sidebar-section overlay-controls">
                <h3 class="sidebar-section-title" data-i18n="sidebar.overlayControls"><i class="fas fa-desktop"></i> Overlay</h3>
                <button id="btn-start" class="app-button secondary full-width">
                    <i class="fas fa-play"></i> <span data-i18n="btn.startRuffle">Start Ruffle</span>
                </button>
                <button id="btn-open" class="app-button secondary full-width">
                    <i class="fas fa-external-link-alt"></i> <span data-i18n="btn.openCase">Open Case</span>
                </button>
                <button id="btn-roll" class="app-button secondary full-width">
                    <i class="fas fa-dice"></i> <span data-i18n="btn.rollCase">Roll Case</span>
                </button>
            </div>

            <div class="sidebar-section status-info">
                <h3 class="sidebar-section-title" data-i18n="sidebar.statusInfo"><i class="fas fa-info-circle"></i> Status</h3>
                <div id="participantCount" class="status-item">
                    <span class="status-label" data-i18n="label.participants"><i class="fas fa-users"></i> Participants:</span>
                    <span class="status-value pc-dynamic">0</span>
                </div>
                <div id="skinDropStatus" class="status-item">
                    <span class="status-label" data-i18n="label.dropModeStatus"><i class="fas fa-box-open"></i> Drop Mode:</span>
                    <span class="status-value sdm-dynamic">
                        <span data-i18n-value-default="label.unknown" data-i18n-value-default-key="label.unknown">Unknown</span>
                    </span>
                </div>
            </div>

            </div>
        <div class="sidebar-footer">
             <p>&copy; 2024 Settings Panel</p>
        </div>
    </aside>

    <div class="main-container">
        <header class="main-header card-style">
            <h1><i class="fas fa-cogs"></i> <span data-i18n="header.settings">Application Settings</span></h1>
            <div id="globalStatusMessage" class="global-status-message">Message</div>
            <div class="header-action-buttons">
                <button type="button" id="openOverlaysBtn" class="app-button secondary" onclick="window.location.href='https://galaxytimer-production.up.railway.app/'">
                    <i class="fas fa-layer-group"></i> <span data-i18n="btn.openOverlays">Overlays</span>
                </button>
                <button type="submit" form="settingsForm" id="saveAllSettingsBtn" class="app-button primary">
                    <i class="fas fa-save"></i> <span data-i18n="btn.saveAllSettings">Save Settings</span>
                </button>
            </div>
        </header>

        <main class="main-content styled-scrollbar">
            <form id="settingsForm" novalidate>
                <section class="settings-block card-style section-general">
                    <h2 class="settings-block-title" data-i18n="section.generalParams"><i class="fas fa-cog"></i> General Parameters</h2>
                    <div class="settings-form-grid">
                        <div class="form-group">
                            <label for="chatDelay" data-i18n="label.chatDelay"><i class="far fa-clock"></i> Chat Delay (sec)</label>
                            <input type="number" id="chatDelay" class="header-input" min="0" value="130" required>
                        </div>
                    </div>
                </section>

                <section class="settings-block card-style section-drop-mode">
                    <h2 class="settings-block-title" data-i18n="section.dropMode"><i class="fas fa-box"></i> Skin Drop Mode</h2>
                    <div class="settings-form-grid">
                        <div class="form-group">
                            <label for="dropMode" data-i18n="label.selectDropMode"><i class="fas fa-sliders-h"></i> Mode</label>
                            <select id="dropMode" class="control-select styled-select">
                                <option value="random" data-i18n="label.random">Random by Rarity</option>
                                <option value="preset" data-i18n="label.preset">Preset Skin</option>
                            </select>
                        </div>
                        <div id="presetSkinSelect" class="form-group" style="display:none;">
                            <label for="fixedSkin" data-i18n="label.fixedSkin"><i class="fas fa-crosshairs"></i> Select Preset Skin</label>
                            <select id="fixedSkin" class="control-select styled-select">
                            </select>
                        </div>
                    </div>
                </section>

                <section class="settings-block card-style section-rarity">
                    <h2 class="settings-block-title" data-i18n="section.rarity"><i class="fas fa-percentage"></i> Drop Rarity (%)</h2>
                    <div class="settings-rarity-grid">
                        <div class="form-group">
                            <label for="chanceMilSpec" data-i18n="label.chanceMilSpec">Mil-Spec</label>
                            <div class="input-with-unit-new">
                                <input type="number" id="chanceMilSpec" class="header-input" step="0.001" value="79.923" required>
                                <span class="unit-span">%</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="chanceRestricted" data-i18n="label.chanceRestricted">Restricted</label>
                            <div class="input-with-unit-new">
                                <input type="number" id="chanceRestricted" class="header-input" step="0.001" value="15.984" required>
                                <span class="unit-span">%</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="chanceClassified" data-i18n="label.chanceClassified">Classified</label>
                            <div class="input-with-unit-new">
                                <input type="number" id="chanceClassified" class="header-input" step="0.001" value="3.197" required>
                                <span class="unit-span">%</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="chanceCovert" data-i18n="label.chanceCovert">Covert</label>
                            <div class="input-with-unit-new">
                                <input type="number" id="chanceCovert" class="header-input" step="0.001" value="0.639" required>
                                <span class="unit-span">%</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="chanceRareSpecialItems" data-i18n="label.chanceRareSpecial">Rare Special</label>
                            <div class="input-with-unit-new">
                                <input type="number" id="chanceRareSpecialItems" class="header-input" step="0.001" value="0.256" required>
                                <span class="unit-span">%</span>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="settings-block card-style section-skins">
                    <div class="section-header">
                        <h2 class="settings-block-title no-border" data-i18n="section.skinsManagement"><i class="fas fa-images"></i> Skins Management</h2>
                        <button type="button" id="addSkinBtn" class="app-button primary">
                            <i class="fas fa-plus"></i> <span data-i18n="btn.addSkin">Add Skin</span>
                        </button>
                    </div>
                    <div class="table-wrapper styled-scrollbar">
                        <table id="skinsTable">
                            <thead>
                                <tr>
                                    <th class="col-type" data-i18n="table.col.weaponType">Weapon Type</th>
                                    <th class="col-name" data-i18n="table.col.name">Name</th>
                                    <th class="col-image" data-i18n="table.col.image">Image</th>
                                    <th class="col-rarity" data-i18n="table.col.rarity">Rarity</th>
                                    <th class="col-actions" data-i18n="table.col.actions">Actions</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </section>
            </form>
        </main>
    </div>

<script>
    (()=>{
        const rarityColors = {

            'Classified':'#F92177','Covert':'#E92E2E','Rare Special Items':'#EFA640'

        const translations = {

                "btn.saveAllSettings": "Сохранить настройки",
                "btn.openOverlays": "Оверлеи",
                "sidebar.overlayControls": "Оверлей", "btn.startRuffle": "Start Ruffle", "btn.openCase": "Open Case", "btn.rollCase": "Roll Case",
                "sidebar.statusInfo": "Статус", "label.participants": "Участники:", "label.dropModeStatus": "Режим дропа:", "label.unknown": "Неизвестно",
                "label.weaponTypeShort": "Тип:", "label.skinNameShort": "Скин:",

                "section.generalParams": "Общие параметры", "label.chatDelay": "Задержка чата (сек)",
                "section.dropMode": "Режим выпадения скинов", "label.selectDropMode": "Режим", "label.random": "Случайный по редкости", "label.preset": "Фиксированный скин",
                "label.fixedSkin": "Выбрать скин для фикс. дропа", "label.selectSkinPlaceholder": "Выберите скин...", "label.noSkinSelected": "Скин не выбран",
                "section.rarity": "Шансы редкости (%)",
                "label.chanceMilSpec": "Mil-Spec", "label.chanceRestricted": "Restricted", "label.chanceClassified": "Classified", "label.chanceCovert": "Covert", "label.chanceRareSpecial": "Rare Special",
                "section.skinsManagement": "Управление скинами", "btn.addSkin": "Добавить скин",
                "table.col.weaponType": "Тип оружия", "table.col.name": "Название", "table.col.image": "Изображение", "table.col.rarity": "Редкость", "table.col.actions": "Действия",
                "label.chooseFile": "Выбрать...", "label.uploading": "Загрузка...", "label.uploadFailed": "Ошибка загрузки", "label.notAnImage": "Не изображение",

                "error.presetNoSkin": "Ошибка: Выбран режим \"Фиксированный скин\", но скин не выбран из списка.",

                "error.loadingSettings": "Ошибка загрузки настроек", "warning.emptySettings": "Внимание: Получены пустые настройки. Используются значения по умолчанию."

            uk: {

                "header.settings": "Налаштування Додатку",

                "btn.openOverlays": "Оверлеї", 
                "sidebar.overlayControls": "Оверлей", "btn.startRuffle": "Start Ruffle", "btn.openCase": "Open Case", "btn.rollCase": "Roll Case",
                "sidebar.statusInfo": "Статус", "label.participants": "Учасники:", "label.dropModeStatus": "Режим дропу:", "label.unknown": "Невідомо",
                "label.weaponTypeShort": "Тип:", "label.skinNameShort": "Скін:",
                "sidebar.language": "Мова",
                "section.generalParams": "Загальні параметри", "label.chatDelay": "Затримка чату (сек)",
                "section.dropMode": "Режим випадіння скінів", "label.selectDropMode": "Режим", "label.random": "Випадковий за рідкістю", "label.preset": "Фіксований скін",
                "label.fixedSkin": "Обрати скін для фікс. дропу", "label.selectSkinPlaceholder": "Оберіть скін...", "label.noSkinSelected": "Скін не обрано",
                "section.rarity": "Шанси рідкості (%)",
                "label.chanceMilSpec": "Mil-Spec", "label.chanceRestricted": "Restricted", "label.chanceClassified": "Classified", "label.chanceCovert": "Covert", "label.chanceRareSpecial": "Rare Special",
                "section.skinsManagement": "Керування скінами", "btn.addSkin": "Додати скін",
                "table.col.weaponType": "Тип зброї", "table.col.name": "Назва", "table.col.image": "Зображення", "table.col.rarity": "Рідкість", "table.col.actions": "Дії",
                "label.chooseFile": "Обрати...", "label.uploading": "Завантаження...", "label.uploadFailed": "Помилка завантаження", "label.notAnImage": "Не зображення",
                "error.invalidRarity": "Помилка: Некоректні шанси рідкості. Для режиму \"Випадковий за рідкістю\" переконайтеся, що всі шанси - числа >= 0 і в сумі дають 100%.",
                "error.presetNoSkin": "Помилка: Обрано режим \"Фіксований скін\", але скін не обрано зі списку.",
                "error.skinNameRequired": "Помилка: Ім'я скіна є обов'язковим для всіх записів у таблиці.",
                "btn.saving": "Збереження...", "success.settingsSaved": "Налаштування успішно збережено!", "btn.saved": "Збережено!",
                "error.savingFailed": "Помилка збереження налаштувань", "btn.saveError": "Помилка!",
                "error.loadingSettings": "Помилка завантаження налаштувань", "warning.emptySettings": "Увага: Отримано порожні налаштування. Використовуються значення за замовчуванням."
            }
        };
        let currentLang = localStorage.getItem('appLanguage') || 'en'; 

        function getTranslation(key, lang = currentLang) {
            return translations[lang]?.[key] || translations['en']?.[key] || key;
        }

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('appLanguage', lang);
            document.documentElement.lang = lang; 
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                const translation = getTranslation(key, lang);
                let textContainer = el;
                if (el.childNodes.length === 1 && el.firstChild.nodeType === Node.ELEMENT_NODE && el.firstChild.tagName === 'SPAN' && !el.firstChild.hasAttributes()) {
                    textContainer = el.firstChild;
                } else {
                    let targetNode = null;
                    if (el.tagName === 'BUTTON') {
                        targetNode = Array.from(el.childNodes).find(node => node.tagName === 'SPAN' && !node.hasAttributes());
                        if (!targetNode) {
                            for (let i = el.childNodes.length - 1; i >= 0; i--) {
                                if (el.childNodes[i].nodeType === Node.TEXT_NODE && el.childNodes[i].textContent.trim() !== '') {
                                    targetNode = el.childNodes[i];
                                    break;
                                }
                            }
                        }
                    }
                    if (targetNode) {
                        textContainer = targetNode;
                    } else { 
                        const simpleSpan = Array.from(el.childNodes).find(node => node.tagName === 'SPAN' && !node.hasAttributes());
                        if (simpleSpan) textContainer = simpleSpan;
                    }
                }


                if (el.tagName === 'INPUT' && (el.type === 'submit' || el.type === 'button') ) {
                        el.value = translation;
                } else if (el.tagName === 'BUTTON') {
                    if (textContainer.nodeType === Node.TEXT_NODE) {
                        const previousSibling = textContainer.previousSibling;
                        if (previousSibling && previousSibling.nodeType === Node.ELEMENT_NODE && (previousSibling.tagName === 'I' || previousSibling.querySelector('i'))) {
                                textContainer.textContent = ` ${translation}`;
                        } else {
                                textContainer.textContent = translation;
                        }
                    } else if (textContainer !== el && textContainer.tagName === 'SPAN') { 
                        textContainer.textContent = translation;
                    } else if (el.title && (el.dataset.i18nTitleKey === key || el.dataset.i18n === key)) {
                        el.title = translation;
                    } else { 
                        let mainTextSpan = el.querySelector('span:not([class])'); 
                        if (mainTextSpan) {
                            mainTextSpan.textContent = translation;
                        } else {
                            let textNode = Array.from(el.childNodes).reverse().find(node => node.nodeType === Node.TEXT_NODE && node.textContent.trim() !== '');
                            if (textNode) { textNode.textContent = ` ${translation}`; } 
                            else if (textContainer === el && !el.querySelector('i')) { 
                                el.textContent = translation;
                            }
                        }
                    }
                } else if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                    if (el.placeholder && (el.dataset.i18nPlaceholderKey === key || el.dataset.i18n === key)) {
                            el.placeholder = translation;
                    }
                } else {
                    textContainer.textContent = translation;
                }
            });
            document.querySelectorAll('[data-i18n-value-default-key]').forEach(el => {
                const valueDefaultKey = el.dataset.i18nValueDefaultKey;
                const currentText = el.textContent.trim();
                const isDefault = ['en', 'ru', 'uk'].some(lng => currentText === (translations[lng]?.[valueDefaultKey]));

                if (isDefault || currentText === el.dataset.i18nValueDefault) { 
                    el.textContent = getTranslation(valueDefaultKey, lang);
                }
            });

            updateSidebarDropStatus();
            updateFixedSkinOptions();
             document.querySelectorAll('#skinsTable .fileName').forEach(fn => {
                if (["Choose...", "Выбрать...", "Обрати..."].includes(fn.textContent.trim())) {
                    fn.textContent = getTranslation("label.chooseFile");
                }
            });
        }


        function updateSidebarDropStatus() {
            const modeSelect = document.getElementById('dropMode');
            if (!modeSelect) return;
            const mode = modeSelect.value;
            const sdm = document.querySelector('.sdm-dynamic');
            if (!sdm) return;

            const baseModeText = getTranslation(`label.${mode}`);

            if (mode === 'preset') {
                const fixedSelect = document.getElementById('fixedSkin');
                if (fixedSelect && fixedSelect.selectedOptions.length > 0 && fixedSelect.value !== "") {
                    const selectedSkinIndex = parseInt(fixedSelect.value, 10);
                    const skinRows = document.querySelectorAll('#skinsTable tbody tr');

                    if (selectedSkinIndex >= 0 && selectedSkinIndex < skinRows.length) {
                        const skinRow = skinRows[selectedSkinIndex];
                        const weaponTypeVal = skinRow.querySelector('.weaponType')?.value.trim() || getTranslation('label.unknown');
                        const skinNameVal = skinRow.querySelector('.skinName')?.value.trim() || getTranslation('label.unknown');
                        const imagePath = skinRow.querySelector('.skinImage')?.dataset.filePath || '';

                        const typeLabel = getTranslation('label.weaponTypeShort');
                        const nameLabel = getTranslation('label.skinNameShort');

                        let imagePreviewHtml = '';
                        if (imagePath) {
                            imagePreviewHtml = `<img src="${imagePath}" alt="${skinNameVal}" class="status-skin-preview">`;
                        } else {
                            imagePreviewHtml = `<span class="status-skin-preview-placeholder"><i class="fas fa-image"></i></span>`;
                        }

                        sdm.innerHTML = `
                            <div class="drop-mode-preset-active">
                                <span class="drop-mode-main-label">${baseModeText}:</span>
                                <div class="preset-skin-status-details">
                                    ${imagePreviewHtml}
                                    <div class="status-skin-text-details">
                                        <div><strong>${typeLabel}</strong> <span class="status-skin-weapontype">${weaponTypeVal}</span></div>
                                        <div><strong>${nameLabel}</strong> <span class="status-skin-name">${skinNameVal}</span></div>
                                    </div>
                                </div>
                            </div>
                        `;
                    } else {
                        sdm.innerHTML = `<span class="drop-mode-main-label">${baseModeText}:</span> ${getTranslation('label.noSkinSelected')}`;
                    }
                } else {
                    sdm.innerHTML = `<span class="drop-mode-main-label">${baseModeText}:</span> ${getTranslation('label.noSkinSelected')}`;
                }
            } else {
                sdm.textContent = baseModeText;
            }
        }


        function fetchCount(){
             const countElement = document.querySelector('.pc-dynamic');
            if (!countElement) return;
            fetch('/participants-count')
             .then(r=>r.ok ? r.json() : Promise.reject(`HTTP error ${r.status}`))
             .then(d=> {
                if (typeof d.count !== 'undefined') { countElement.textContent = d.count; }
                else { console.error('Invalid count data:', d); countElement.textContent = 'Err'; }
             })
             .catch(e => { console.error('Error fetching count:', e); countElement.textContent = 'Err'; });
        }
        async function uploadFile(file){
            const fd = new FormData(); fd.append('file', file);
            try {
                const res = await fetch('/upload-skin',{method:'POST',body:fd});
                if (!res.ok) { const errTxt = await res.text(); throw new Error(`Upload failed: ${res.status} ${errTxt}`); }
                return await res.json();
            } catch (error) {
                console.error("Upload error:", error);
                showMessage(getTranslation('label.uploadFailed') + `: ${error.message}`, 'error');
                throw error;
            }
        }
        function updateRarityColor(selectElement){
             const colorIndicator = selectElement.closest('td').querySelector('.rarity-color-indicator-new');
            if (colorIndicator) { colorIndicator.style.backgroundColor = rarityColors[selectElement.value] || '#ccc'; }
        }

        function updateFixedSkinOptions(){
            const fs = document.getElementById('fixedSkin');
            if (!fs) return;
            const prevValue = fs.value;
            fs.innerHTML = '';
            const placeholderOption = new Option(getTranslation('label.selectSkinPlaceholder'), "");
            placeholderOption.disabled = true;
            fs.add(placeholderOption);

            document.querySelectorAll('#skinsTable tbody tr').forEach((tr, i) => {
                const weaponType = tr.querySelector('.weaponType').value.trim() || 'Unknown Type';
                const skinName = tr.querySelector('.skinName').value.trim() || 'Unnamed Skin';
                fs.add(new Option(`${weaponType} : ${skinName}`, i));
            });

            if (prevValue !== null && prevValue !== '' && fs.querySelector(`option[value="${prevValue}"]`)) { fs.value = prevValue; }
            else { fs.value = ""; }
            updateSidebarDropStatus();
        }

        function addSkinRow(skin = {}) {
            const tb = document.querySelector('#skinsTable tbody');
            if (!tb) return;
            const tr = document.createElement('tr');
            const chooseFileText = getTranslation("label.chooseFile");
            const skinImageName = skin.imageName || chooseFileText;

            tr.innerHTML = `
                <td class="col-type"><input type="text" class="header-input input-table weaponType" value="${skin.weapontype || ''}" placeholder="e.g., AK-47"></td>
                <td class="col-name"><input type="text" class="header-input input-table skinName" value="${skin.name || ''}" required placeholder="e.g., Redline"></td>
                <td class="col-image">
                    <div class="skin-image-cell-content">
                        <div class="image-preview-wrapper">
                            <img src="${skin.image || '#'}" alt="Preview" class="skin-image-preview" style="${skin.image ? 'display:block;' : 'display:none;'}">
                            <span class="preview-placeholder ${skin.image ? 'hidden': ''}"><i class="fas fa-image"></i></span>
                        </div>
                        <div class="custom-file-input-wrapper">
                            <label class="app-button tertiary small-button file-upload-button">
                                <i class="fas fa-upload"></i>
                                <input type="file" class="skinImage visually-hidden" accept="image/*">
                            </label>
                            <span class="file-name-display fileName">${skinImageName}</span>
                        </div>
                    </div>
                </td>
                <td class="col-rarity">
                    <div class="rarity-select-wrapper-new">
                        <select class="control-select styled-select select-table skinRarity" required>
                            <option value="Mil-Spec" ${skin.rarity === 'Mil-Spec' ? 'selected' : ''}>Mil-Spec</option>
                            <option value="Restricted" ${skin.rarity === 'Restricted' ? 'selected' : ''}>Restricted</option>
                            <option value="Classified" ${skin.rarity === 'Classified' ? 'selected' : ''}>Classified</option>
                            <option value="Covert" ${skin.rarity === 'Covert' ? 'selected' : ''}>Covert</option>
                            <option value="Rare Special Items" ${skin.rarity === 'Rare Special Items' ? 'selected' : ''}>Rare Special Items</option>
                        </select>
                        <span class="rarity-color-indicator-new"></span>
                    </div>
                </td>
                <td class="col-actions">
                    <button type="button" class="removeSkinBtn app-button danger" title="Delete Skin" style="min-width: auto; padding: var(--spacing-xs) var(--spacing-sm); line-height:1;">
                        <i class="fas fa-trash-alt" style="margin-right:0;"></i>
                    </button>
                </td>
            `;
            tb.append(tr);

            const nameI = tr.querySelector('.skinName');
            const typeI = tr.querySelector('.weaponType');
            const fileI = tr.querySelector('.skinImage');
            const fileN = tr.querySelector('.fileName');
            const rarI = tr.querySelector('.skinRarity');
            const delB = tr.querySelector('.removeSkinBtn');
            const imgPreview = tr.querySelector('.skin-image-preview');
            const previewPlaceholder = tr.querySelector('.preview-placeholder');

            fileI.dataset.filePath = skin.image || '';
            updateRarityColor(rarI);

            rarI.onchange = () => updateRarityColor(rarI);
            delB.onclick = () => { tr.remove(); updateFixedSkinOptions(); };

            fileI.onchange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = function(event) {
                            imgPreview.src = event.target.result;
                            imgPreview.style.display = 'block';
                            if (previewPlaceholder) previewPlaceholder.classList.add('hidden');
                        }
                        reader.readAsDataURL(file);
                    } else {
                        imgPreview.src = '#';
                        imgPreview.style.display = 'none';
                        if (previewPlaceholder) previewPlaceholder.classList.remove('hidden');
                        fileN.textContent = getTranslation('label.notAnImage');
                        return;
                    }

                    fileN.textContent = getTranslation('label.uploading');
                    fileN.classList.add('loading');
                    try {
                        const resp = await uploadFile(file);
                        fileI.dataset.filePath = resp.path;
                        fileN.textContent = resp.path.split(/[\\/]/).pop() || 'Error name';
                    } catch (err) {
                        fileN.textContent = getTranslation('label.uploadFailed');
                        imgPreview.src = '#';
                        imgPreview.style.display = 'none';
                        if (previewPlaceholder) previewPlaceholder.classList.remove('hidden');
                    } finally {
                        fileN.classList.remove('loading');
                    }
                } else {
                    const existingPath = fileI.dataset.filePath;
                    fileN.textContent = existingPath ? existingPath.split(/[\\/]/).pop() : chooseFileText;
                    if (existingPath) {
                        imgPreview.src = existingPath;
                        imgPreview.style.display = 'block';
                        if (previewPlaceholder) previewPlaceholder.classList.add('hidden');
                    } else {
                        imgPreview.src = '#';
                        imgPreview.style.display = 'none';
                        if (previewPlaceholder) previewPlaceholder.classList.remove('hidden');
                    }
                }
            };
            nameI.oninput = updateFixedSkinOptions;
            typeI.oninput = updateFixedSkinOptions;
        }

        function buildConfig(){
             const cfg = {
                chatDelay: 130, skins: [], dropMode: document.getElementById('dropMode').value,
                fixedSkin: null, fixedSkinIndex: null, rarityChances: {}
            };
            const cdi = document.getElementById('chatDelay');
            if (cdi && cdi.value.trim()!=="" && !isNaN(parseInt(cdi.value))) cfg.chatDelay = +cdi.value; else if(cdi) cdi.value=cfg.chatDelay;

            document.querySelectorAll('#skinsTable tbody tr').forEach((tr, idx)=>{
                const fPath = tr.querySelector('.skinImage')?.dataset.filePath || '';
                cfg.skins.push({
                    name: tr.querySelector('.skinName')?.value || '', weapontype: tr.querySelector('.weaponType')?.value||'',
                    image: fPath, imageName: fPath.split(/[\\/]/).pop()||'', rarity: tr.querySelector('.skinRarity')?.value||'Mil-Spec'
                });
            });

            if (cfg.dropMode==='preset') {
                const selIdxStr = document.getElementById('fixedSkin')?.value;
                if (selIdxStr!==null && selIdxStr!=="" && !isNaN(selIdxStr)) {
                    const idx = parseInt(selIdxStr, 10);
                    if (idx>=0 && idx<cfg.skins.length) { cfg.fixedSkin=cfg.skins[idx]; cfg.fixedSkinIndex=idx; }
                    else { cfg.fixedSkin=null; cfg.fixedSkinIndex=null; }
                } else { cfg.fixedSkin=null; cfg.fixedSkinIndex=null; }
            }

            let totalChance = 0; let hasInvalidChance = false;
            const rarities = {'Mil-Spec':0, 'Restricted':0, 'Classified':0, 'Covert':0, 'Rare Special Items':0};
            for (const key in rarities) {
                const el = document.getElementById('chance'+key.replace(/\W/g,''));
                let val = 0;
                if (el && el.value!=="" && !isNaN(parseFloat(el.value))) {
                    val = parseFloat(el.value);
                    if (val<0) { val=0; el.value=0; hasInvalidChance=true; }
                } else { if(el) el.value=0; hasInvalidChance=true; }
                cfg.rarityChances[key] = val; totalChance += val;
            }
            if (cfg.dropMode === 'random' && Math.abs(totalChance - 100) > 0.001) {
                console.warn(`Total rarity chance is ${totalChance.toFixed(3)}%, not 100%.`); hasInvalidChance=true;
            }
            cfg.isValid = !hasInvalidChance; return cfg;
        }
        function showMessage(text, type = 'info', duration = 4000) {
            const msgEl = document.getElementById('globalStatusMessage');
            if(!msgEl) return;
            msgEl.textContent = text; msgEl.className = `global-status-message ${type}`;
            void msgEl.offsetWidth;
            msgEl.classList.add('visible');
            if (msgEl.timeoutId) clearTimeout(msgEl.timeoutId);
            msgEl.timeoutId = setTimeout(() => {
                msgEl.classList.remove('visible');
                 setTimeout(() => { if (!msgEl.classList.contains('visible')) {msgEl.className='global-status-message';}},300);
                 delete msgEl.timeoutId;
            }, duration);
        }
        function saveSettings(){
             const cfg = buildConfig();
            if (!cfg.isValid) { showMessage(getTranslation('error.invalidRarity'), 'error'); return; }
            if (cfg.dropMode==='preset' && !cfg.fixedSkin && cfg.skins.length>0) { showMessage(getTranslation('error.presetNoSkin'),'error'); return;}
            if (cfg.skins.some(s=>!s.name)) { showMessage(getTranslation('error.skinNameRequired'),'error'); return; }

            const btn = document.getElementById('saveAllSettingsBtn');
            const btnIconOnly = btn.querySelector('i').outerHTML;
            const btnTextSpan = btn.querySelector('span');
            const originalText = btnTextSpan ? btnTextSpan.textContent : '';

            btn.disabled = true; btn.classList.add('saving');
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> <span>${getTranslation('btn.saving')}</span>`;

            fetch('/save-settings', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(cfg) })
            .then(r => { if (!r.ok) return r.text().then(t => {throw new Error(`Save failed: ${r.status} ${t}`);}); return r.json(); })
            .then(d => {
                showMessage(d.message || getTranslation('success.settingsSaved'), 'success');
                btn.classList.remove('saving'); btn.classList.add('saved');
                btn.innerHTML = `<i class="fas fa-check"></i> <span>${getTranslation('btn.saved')}</span>`;
                setTimeout(() => { btn.classList.remove('saved'); btn.innerHTML = `${btnIconOnly} <span>${originalText}</span>`; btn.disabled = false; }, 2000);
            })
            .catch(e => {
                console.error('Error saving:', e); showMessage(getTranslation('error.savingFailed')+`: ${e.message}`, 'error');
                btn.classList.remove('saving'); btn.classList.add('error');
                btn.innerHTML = `<i class="fas fa-times"></i> <span>${getTranslation('btn.saveError')}</span>`;
                setTimeout(() => { btn.classList.remove('error'); btn.innerHTML = `${btnIconOnly} <span>${originalText}</span>`; btn.disabled = false; }, 3000);
            });
        }

        function init(){
            fetchCount();
            // Удален код, связанный с кнопками lang-btn-sidebar, так как сами кнопки удалены
            /*
            const langBtns = document.querySelectorAll('.lang-btn-sidebar');
            langBtns.forEach(b => {
                b.addEventListener('click', (e) => {
                    e.preventDefault();
                    setLanguage(b.dataset.lang);
                    langBtns.forEach(btn => btn.classList.remove('active'));
                    b.classList.add('active');
                });
            });
            langBtns.forEach(btn => btn.classList.remove('active')); 
            const activeLangButton = document.querySelector(`.lang-btn-sidebar[data-lang="${currentLang}"]`);
            if (activeLangButton) activeLangButton.classList.add('active');
            else { 
                const enButton = document.querySelector(`.lang-btn-sidebar[data-lang="en"]`);
                if (enButton) enButton.classList.add('active');
            }
            */

            document.getElementById('btn-start')?.addEventListener('click', ()=>fetch('/start-collection',{method:'POST'}));
            document.getElementById('btn-open')?.addEventListener('click', ()=>fetch('/open-overlay',{method:'POST'}));
            document.getElementById('btn-roll')?.addEventListener('click', ()=>fetch('/roll',{method:'POST'}));
            document.getElementById('addSkinBtn')?.addEventListener('click', ()=> { addSkinRow(); updateFixedSkinOptions(); });

            const dmSel = document.getElementById('dropMode'), psDiv = document.getElementById('presetSkinSelect'), fsSel = document.getElementById('fixedSkin');
            if(dmSel&&psDiv) dmSel.addEventListener('change', e=>{ psDiv.style.display=e.target.value==='preset'?'block':'none'; updateSidebarDropStatus(); });
            if(fsSel) fsSel.addEventListener('change', updateSidebarDropStatus);
            document.getElementById('settingsForm').addEventListener('submit', e=>{ e.preventDefault(); saveSettings(); });

            fetch('/get-settings')
            .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
            .then(cfg => {
                if (!cfg || Object.keys(cfg).length === 0) {
                    showMessage(getTranslation('warning.emptySettings'), 'error'); cfg = {};
                }
                document.getElementById('chatDelay').value = cfg.chatDelay ?? 130;
                document.querySelector('#skinsTable tbody').innerHTML = '';
                (cfg.skins||[]).forEach(s => addSkinRow(s));
                updateFixedSkinOptions(); 

                const cdm = cfg.dropMode || 'random';
                if(dmSel) dmSel.value = cdm;
                if(psDiv) psDiv.style.display = cdm === 'preset' ? 'block' : 'none';

                if (cdm==='preset' && cfg.skins && cfg.skins.length > 0 && fsSel) {
                    if (cfg.fixedSkinIndex !== null && cfg.fixedSkinIndex >= 0 && cfg.fixedSkinIndex < cfg.skins.length) {
                        fsSel.value = cfg.fixedSkinIndex;
                    } else if (cfg.fixedSkin?.imageName) { 
                        const idx = (cfg.skins||[]).findIndex(s => s.imageName === cfg.fixedSkin.imageName);
                        fsSel.value = idx >= 0 ? idx : "";
                    } else { fsSel.value = ""; }
                } else if (cdm==='preset' && fsSel) { fsSel.value = ""; }


                const defChances = {'Mil-Spec':79.923,'Restricted':15.984,'Classified':3.197,'Covert':0.639,'Rare Special Items':0.256};
                const lChances = cfg.rarityChances || {};
                for(const k in defChances){ const el=document.getElementById('chance'+k.replace(/\W/g,'')); if(el) el.value = (typeof lChances[k]==='number')?lChances[k]:defChances[k];}

                setLanguage(currentLang); // Устанавливаем язык по умолчанию или из localStorage
                updateSidebarDropStatus(); 
            })
            .catch(e => {
                console.error('Error loading settings:', e);
                showMessage(getTranslation('error.loadingSettings') + `: ${e.message}. Defaults used.`, 'error');
                const defChances={'Mil-Spec':79.923,'Restricted':15.984,'Classified':3.197,'Covert':0.639,'Rare Special Items':0.256};
                for(const k in defChances){ const el=document.getElementById('chance'+k.replace(/\W/g,'')); if(el) el.value = defChances[k];}
                setLanguage(currentLang); // Устанавливаем язык по умолчанию или из localStorage в случае ошибки
                updateSidebarDropStatus(); 
            });
        }
        document.addEventListener('DOMContentLoaded', init);
    })();
    </script>
